<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>灵感泡泡</title>
<style>
:root {
  --bg: #fbfbfa;
  --ink: #1f1f1f;
  --muted: #7b7b78;
  --soft: #f1f1ef;
  --line: rgba(31,31,31,.10);
  --panel: rgba(255,255,255,.92);
  --panel-strong: #ffffff;
  --accent: #111111;
  --accent-soft: rgba(31,31,31,.08);
  --shadow: 0 22px 70px rgba(15, 15, 15, .10);
  --shadow-soft: 0 8px 28px rgba(15, 15, 15, .07);
}
* { box-sizing: border-box; margin: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font: 14px/1.6 -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif;
  overflow: hidden;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(31,31,31,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(31,31,31,.025) 1px, transparent 1px);
  background-size: 28px 28px;
  mask-image: linear-gradient(to bottom, rgba(0,0,0,.55), transparent 76%);
}
header {
  position: fixed;
  top: 14px;
  left: 16px;
  right: 16px;
  z-index: 10;
  min-height: 60px;
  display: grid;
  grid-template-columns: minmax(176px, auto) minmax(220px, 1fr) auto;
  align-items: center;
  gap: 14px;
  padding: 10px 10px 10px 14px;
  background: rgba(255,255,255,.88);
  backdrop-filter: blur(18px) saturate(1.1);
  border: 1px solid rgba(31,31,31,.08);
  border-bottom-color: var(--line);
  border-radius: 12px;
  box-shadow: var(--shadow-soft);
}
.brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
.mark {
  position: relative;
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: #fff;
  border: 1px solid rgba(31,31,31,.13);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.9);
}
.mark::before,
.mark::after {
  content: "";
  position: absolute;
  border-radius: 999px;
}
.mark::before {
  width: 18px;
  height: 18px;
  left: 8px;
  top: 8px;
  background: #111;
}
.mark::after {
  width: 12px;
  height: 12px;
  right: 7px;
  bottom: 7px;
  background: #fff;
  border: 2px solid #111;
}
header h1 { font-size: 15px; line-height: 1.1; font-weight: 720; letter-spacing: 0; }
#stats { color: var(--muted); font-size: 12px; white-space: nowrap; }
.tools { display: flex; justify-content: center; align-items: center; gap: 8px; min-width: 0; }
.actions { display: flex; align-items: center; justify-content: flex-end; gap: 8px; min-width: 0; }
.search-wrap {
  position: relative;
  width: min(420px, 100%);
}
.search-wrap .ico-search {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  pointer-events: none;
}
.ico-search::before {
  content: "";
  position: absolute;
  width: 8px;
  height: 8px;
  left: 1px;
  top: 1px;
  border: 1.7px solid currentColor;
  border-radius: 50%;
}
.ico-search::after {
  content: "";
  position: absolute;
  width: 6px;
  height: 1.7px;
  left: 8px;
  top: 10px;
  background: currentColor;
  transform: rotate(45deg);
  transform-origin: left center;
}
.search {
  width: 100%;
  height: 38px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  color: var(--ink);
  padding: 0 15px 0 35px;
  outline: none;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.72);
}
.search::placeholder { color: rgba(119,116,107,.76); }
.search:focus { border-color: rgba(31,31,31,.34); box-shadow: 0 0 0 4px var(--accent-soft); }
.project-picker { position: relative; min-width: 148px; }
.project-filter {
  height: 38px;
  width: 100%;
  min-width: 148px;
  max-width: 220px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  color: var(--ink);
  padding: 0 30px 0 12px;
  outline: none;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.72);
  cursor: pointer;
  text-align: left;
  position: relative;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.project-filter::after {
  content: "";
  position: absolute;
  right: 12px;
  top: 50%;
  width: 7px;
  height: 7px;
  border-right: 1.5px solid currentColor;
  border-bottom: 1.5px solid currentColor;
  transform: translateY(-65%) rotate(45deg);
  opacity: .65;
}
.project-filter:focus { border-color: rgba(31,31,31,.34); box-shadow: 0 0 0 4px var(--accent-soft); }
.project-menu {
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  z-index: 24;
  width: 280px;
  max-height: min(520px, calc(100vh - 110px));
  overflow: auto;
  padding: 8px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: rgba(255,255,255,.98);
  color: var(--ink);
  box-shadow: var(--shadow-soft);
  backdrop-filter: blur(18px);
}
.project-menu[hidden] { display: none; }
.project-menu-section { display: grid; gap: 4px; padding-bottom: 7px; }
.project-menu-section + .project-menu-section { border-top: 1px solid var(--line); padding-top: 8px; }
.project-option-row { display: grid; grid-template-columns: minmax(0, 1fr) 28px; gap: 4px; align-items: center; }
.project-option,
.project-icon {
  height: 32px;
  border: 0;
  border-radius: 8px;
  background: transparent;
  color: var(--ink);
  cursor: pointer;
}
.project-option {
  text-align: left;
  padding: 0 9px;
  font: inherit;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.project-option:hover,
.project-icon:hover { background: var(--soft); }
.project-option.on { background: var(--ink); color: #fff; }
.project-icon {
  position: relative;
  color: var(--muted);
}
.project-icon::before {
  content: "";
  position: absolute;
  left: 8px;
  top: 15px;
  width: 12px;
  height: 3px;
  border-radius: 2px;
  background: currentColor;
  transform: rotate(-38deg);
  transform-origin: center;
}
.project-icon::after {
  content: "";
  position: absolute;
  left: 17px;
  top: 10px;
  width: 4px;
  height: 4px;
  border-radius: 1px;
  background: currentColor;
  transform: rotate(-38deg);
}
.project-inline-form {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 6px;
  padding: 5px 0 6px;
}
.project-inline-form[hidden] { display: none; }
.project-inline-form input {
  min-width: 0;
  height: 32px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  color: var(--ink);
  padding: 0 9px;
  outline: none;
}
.project-inline-form button,
.project-create button {
  height: 32px;
  border: 0;
  border-radius: 8px;
  background: var(--ink);
  color: #fff;
  cursor: pointer;
  padding: 0 10px;
}
.project-create { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 6px; }
.project-create label,
.project-menu-status {
  grid-column: 1 / -1;
  color: var(--muted);
  font-size: 11px;
}
.project-create input {
  min-width: 0;
  height: 32px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  color: var(--ink);
  padding: 0 9px;
  outline: none;
}
.project-menu-status.error { color: #9f1d1d; }
.tabs {
  display: inline-flex;
  gap: 3px;
  padding: 3px;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: var(--soft);
}
.tabs button {
  height: 32px;
  min-width: 62px;
  background: transparent;
  border: 0;
  color: var(--muted);
  padding: 0 13px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
}
.tabs button.on { color: #fff; background: var(--ink); box-shadow: 0 8px 18px rgba(31,31,31,.13); }
.ico {
  position: relative;
  width: 14px;
  height: 14px;
  display: inline-block;
  flex: 0 0 auto;
}
.ico-graph::before,
.ico-graph::after {
  content: "";
  position: absolute;
  border-radius: 999px;
  background: currentColor;
}
.ico-graph::before { width: 6px; height: 6px; left: 1px; top: 2px; box-shadow: 7px 5px 0 currentColor; }
.ico-graph::after { width: 9px; height: 1.5px; left: 4px; top: 7px; transform: rotate(35deg); opacity: .65; }
.ico-time::before {
  content: "";
  position: absolute;
  inset: 1px;
  border: 1.8px solid currentColor;
  border-radius: 999px;
}
.ico-time::after {
  content: "";
  position: absolute;
  left: 7px;
  top: 4px;
  width: 1.6px;
  height: 5px;
  background: currentColor;
  box-shadow: 3px 4px 0 -1px currentColor;
}
.ico-more::before {
  content: "";
  position: absolute;
  left: 1px;
  top: 6px;
  width: 3px;
  height: 3px;
  border-radius: 999px;
  background: currentColor;
  box-shadow: 5px 0 0 currentColor, 10px 0 0 currentColor;
}
.export { position: relative; }
.export-toggle {
  height: 38px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  color: var(--ink);
  padding: 0 14px;
  cursor: pointer;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.72);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  white-space: nowrap;
}
.export-menu {
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  width: 220px;
  display: none;
  padding: 7px;
  background: rgba(255,255,255,.98);
  border: 1px solid rgba(31,31,31,.09);
  border-bottom-color: var(--line);
  border-radius: 12px;
  box-shadow: var(--shadow-soft);
  backdrop-filter: blur(18px);
}
.export.open .export-menu { display: block; }
.export-menu button {
  width: 100%;
  display: block;
  border: 0;
  border-radius: 8px;
  background: transparent;
  color: var(--ink);
  text-align: left;
  padding: 9px 10px;
  cursor: pointer;
  font: inherit;
}
.export-menu button:hover { background: var(--soft); }
.export-menu small { display: block; color: var(--muted); font-size: 11px; line-height: 1.35; margin-top: 1px; }
.export-status {
  min-height: 18px;
  padding: 4px 10px 2px;
  color: var(--muted);
  font-size: 11px;
  word-break: break-all;
}
.export-status a { color: var(--ink); text-decoration: none; border-bottom: 1px solid rgba(31,31,31,.25); }
.project-modal {
  position: fixed;
  inset: 0;
  z-index: 30;
  display: flex;
  justify-content: flex-end;
  align-items: stretch;
  padding: 10px;
  background: rgba(31,31,31,.12);
  backdrop-filter: blur(5px);
}
.project-modal[hidden] { display: none; }
.project-card {
  width: min(390px, calc(100vw - 20px));
  height: 100%;
  padding: 0;
  background: rgba(255,255,255,.98);
  border: 1px solid rgba(31,31,31,.10);
  border-radius: 12px;
  box-shadow: var(--shadow);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.project-card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 18px 18px 15px;
  border-bottom: 1px solid var(--line);
  background: #fff;
}
.project-card h2 { font-size: 17px; line-height: 1.2; }
.project-card p {
  margin-top: 4px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.45;
}
.project-card .close {
  position: static;
  width: 30px;
  height: 30px;
  flex: 0 0 auto;
}
.project-sheet-body {
  display: grid;
  gap: 12px;
  padding: 14px;
  overflow: auto;
}
.project-form {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  padding: 13px;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: #fff;
}
.project-form.rename { grid-template-columns: 1fr; }
.project-form label {
  grid-column: 1 / -1;
  color: var(--ink);
  font-size: 13px;
  font-weight: 650;
}
.project-form small {
  grid-column: 1 / -1;
  color: var(--muted);
  font-size: 11px;
  line-height: 1.45;
  margin-top: -5px;
}
.project-form input,
.project-form select {
  height: 38px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  color: var(--ink);
  padding: 0 11px;
  outline: none;
}
.project-form button {
  height: 36px;
  min-width: 72px;
  border: 0;
  border-radius: 8px;
  background: var(--ink);
  color: #fff;
  cursor: pointer;
  padding: 0 13px;
}
.project-form button:disabled { opacity: .45; cursor: not-allowed; }
.project-status {
  min-height: 20px;
  padding: 0 4px;
  color: var(--muted);
  font-size: 12px;
}
.project-status.error { color: #9f1d1d; }
#view-graph, #view-timeline { position: fixed; inset: 0; padding-top: 86px; }
#cv { width: 100%; height: 100%; display: block; cursor: grab; }
#view-timeline { overflow: auto; }
#view-timeline svg { display: block; }
.legend {
  position: fixed;
  left: 18px;
  bottom: 18px;
  z-index: 10;
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  max-width: min(680px, calc(100vw - 36px));
  font-size: 12px;
  color: var(--muted);
}
.legend span {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  min-height: 28px;
  padding: 4px 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255,255,255,.88);
  backdrop-filter: blur(12px);
  box-shadow: 0 7px 18px rgba(15,15,15,.04);
}
.legend i { width: 8px; height: 8px; border-radius: 50%; display: inline-block; box-shadow: 0 0 0 3px rgba(31,31,31,.05); }
#panel {
  position: fixed;
  top: 88px;
  right: 16px;
  bottom: 16px;
  width: 370px;
  max-width: calc(100vw - 32px);
  z-index: 11;
  background: var(--panel);
  border: 1px solid rgba(31,31,31,.09);
  border-bottom-color: var(--line);
  border-radius: 14px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(24px) saturate(1.15);
  padding: 22px;
  overflow-y: auto;
  transform: translateX(calc(100% + 26px));
  transition: transform .26s cubic-bezier(.2,.8,.2,1);
}
#panel.open { transform: none; }
#panel .close {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 32px;
  height: 32px;
  background: var(--soft);
  border: 0;
  border-radius: 50%;
  color: var(--muted);
  font-size: 18px;
  cursor: pointer;
}
#panel h2 { font-size: 22px; line-height: 1.2; margin-bottom: 8px; padding-right: 36px; letter-spacing: 0; }
#panel .meta { color: var(--muted); font-size: 12px; margin-bottom: 18px; display: flex; flex-wrap: wrap; gap: 7px; align-items: center; }
#panel .chip { border: 1px solid var(--line); border-radius: 6px; padding: 2px 8px; font-size: 11px; background: var(--soft); }
#panel .body p { margin-bottom: 12px; color: #333129; }
#panel .body blockquote {
  margin: 10px 0 14px;
  padding: 10px 12px;
  border-left: 3px solid rgba(31,31,31,.32);
  background: rgba(31,31,31,.04);
  color: #3d3b35;
  border-radius: 0 8px 8px 0;
}
#panel .links { margin-top: 18px; border-top: 1px solid var(--line); padding-top: 14px; }
#panel .links h3 { font-size: 12px; color: var(--muted); font-weight: 650; margin-bottom: 8px; }
#panel .links div { margin: 6px 0; }
.ideas { margin-top: 18px; border-top: 1px solid var(--line); padding-top: 14px; }
.ideas h3 { font-size: 12px; color: var(--muted); font-weight: 650; margin-bottom: 8px; }
.home-ideas {
  position: fixed;
  left: 16px;
  bottom: 16px;
  z-index: 8;
  width: min(430px, calc(100vw - 32px));
  padding: 16px;
  background: rgba(255,255,255,.90);
  border: 1px solid rgba(31,31,31,.09);
  border-bottom-color: var(--line);
  border-radius: 14px;
  box-shadow: var(--shadow-soft);
  backdrop-filter: blur(22px) saturate(1.1);
}
.home-ideas:not(.open) { display: none; }
.idea-launcher {
  position: fixed;
  left: 16px;
  bottom: 16px;
  z-index: 8;
  height: 44px;
  min-width: 122px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 0 14px;
  border: 1px solid rgba(31,31,31,.10);
  border-radius: 999px;
  background: rgba(255,255,255,.92);
  color: var(--ink);
  box-shadow: var(--shadow-soft);
  backdrop-filter: blur(20px) saturate(1.1);
  font: inherit;
  font-weight: 650;
  cursor: pointer;
}
.idea-launcher:hover { background: #fff; }
.bulb-icon {
  position: relative;
  width: 17px;
  height: 20px;
  flex: 0 0 auto;
}
.bulb-icon::before {
  content: "";
  position: absolute;
  left: 3px;
  top: 1px;
  width: 11px;
  height: 12px;
  border: 2px solid currentColor;
  border-bottom: 0;
  border-radius: 999px 999px 7px 7px;
}
.bulb-icon::after {
  content: "";
  position: absolute;
  left: 5px;
  bottom: 1px;
  width: 7px;
  height: 5px;
  border-top: 2px solid currentColor;
  border-bottom: 2px solid currentColor;
  border-radius: 2px;
}
.home-ideas-head {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: flex-start;
  margin-bottom: 10px;
}
.home-ideas-title { min-width: 0; }
.home-ideas h2 {
  font-size: 13px;
  line-height: 1.3;
  letter-spacing: 0;
  margin-bottom: 2px;
}
.home-ideas .source {
  color: var(--muted);
  font-size: 11px;
  line-height: 1.35;
}
.cycle-ideas {
  flex: 0 0 auto;
  height: 28px;
  padding: 0 10px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--soft);
  color: var(--ink);
  font: inherit;
  font-size: 12px;
  cursor: pointer;
}
.cycle-ideas:hover { background: #fff; }
.close-ideas {
  flex: 0 0 auto;
  width: 28px;
  height: 28px;
  border: 0;
  border-radius: 50%;
  background: var(--soft);
  color: var(--muted);
  font-size: 17px;
  line-height: 1;
  cursor: pointer;
}
.close-ideas:hover { background: #fff; color: var(--ink); }
.idea-list { display: grid; gap: 8px; }
.idea-btn {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: #fff;
  color: var(--ink);
  padding: 10px 11px;
  text-align: left;
  font: inherit;
  line-height: 1.45;
  cursor: pointer;
}
.idea-btn:hover { background: var(--soft); }
.home-ideas .idea-list { gap: 7px; }
.home-ideas .idea-btn {
  min-height: 38px;
  padding: 8px 10px;
  border-radius: 8px;
  font-size: 12px;
}
.copy-tip {
  margin-top: 8px;
  color: var(--muted);
  font-size: 11px;
  min-height: 16px;
}
.copy-toast {
  position: fixed;
  left: 50%;
  bottom: 26px;
  z-index: 30;
  transform: translate(-50%, 16px);
  opacity: 0;
  pointer-events: none;
  padding: 9px 13px;
  border: 1px solid rgba(31,31,31,.13);
  border-radius: 999px;
  background: rgba(31,31,31,.92);
  color: #fff;
  font-size: 13px;
  box-shadow: 0 12px 30px rgba(31,31,31,.2);
  transition: opacity .18s ease, transform .18s ease;
}
.copy-toast.show {
  opacity: 1;
  transform: translate(-50%, 0);
}
a.wl { color: var(--accent); cursor: pointer; text-decoration: none; border-bottom: 1px solid rgba(31,31,31,.24); }
.ghost-hint { color: var(--muted); font-style: italic; }
#empty {
  position: fixed;
  inset: 0;
  z-index: 2;
  display: grid;
  place-items: center;
  padding: 120px 22px 60px;
  color: var(--muted);
  pointer-events: none;
}
.empty-card {
  width: min(560px, 100%);
  padding: 36px;
  text-align: left;
  background: rgba(255,255,255,.92);
  border: 1px solid rgba(31,31,31,.08);
  border-bottom-color: var(--line);
  border-radius: 14px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(22px);
}
.empty-icon {
  position: relative;
  width: 54px;
  height: 38px;
  margin-bottom: 18px;
}
.empty-icon::before,
.empty-icon::after {
  content: "";
  position: absolute;
  border-radius: 999px;
}
.empty-icon::before {
  width: 34px;
  height: 34px;
  left: 0;
  top: 2px;
  background: #111;
}
.empty-icon::after {

const DATA = {"nodes": [{"id": "Agent桌面观察器", "date": "2026-06-11", "created_at": "2026-06-11T17:39:54+08:00", "modified": 1781189233.5012796, "path": "Agent桌面观察器.md", "project": "", "topics": ["产品", "AI", "交互"], "body": "这不是聊天框里的小游戏,而是一个类似 Vibe Island、桌面挂件、灵动岛的小工具:它常驻在桌面或屏幕边缘,让用户在工作时随时瞄一眼,看到后台 agent 们正在做什么。\n\n核心价值是把黑箱式的 agent 工作流变成一个可观察的微型世界。比如某个 agent 正在查资料,它就在湖边钓鱼或翻书;某个 agent 正在写代码,它就在修桥、搭积木、搬材料;某个 agent 卡住了,它会停下来挠头、鱼线打结、冒出问号;完成任务时,它插旗、收鱼篓、把成果放进小仓库。\n\n它应该绑定真实状态,而不是纯装饰动画。底层可以接收类似 `agent.started`、`tool.called`、`tool.finished`、`agent.blocked`、`agent.completed`、`agent.needs_input` 的事件,再映射成小世界里的动作。这样用户看到的不是假的热闹,而是真实工作遥测的游戏化表达。\n\n折叠时它可以像灵动岛一样只显示一行状态:几个 agent 在工作、有没有卡住、有没有新产出。展开时才看到完整的小岛、湖面、钓手、任务气泡和今日成果。\n\n关联:[[等待剧场]]、[[多钓手隐喻]]、[[状态游戏化]]、[[第三者闲置游戏]]", "html": "<p>这不是聊天框里的小游戏,而是一个类似 Vibe Island、桌面挂件、灵动岛的小工具:它常驻在桌面或屏幕边缘,让用户在工作时随时瞄一眼,看到后台 agent 们正在做什么。</p><p>核心价值是把黑箱式的 agent 工作流变成一个可观察的微型世界。比如某个 agent 正在查资料,它就在湖边钓鱼或翻书;某个 agent 正在写代码,它就在修桥、搭积木、搬材料;某个 agent 卡住了,它会停下来挠头、鱼线打结、冒出问号;完成任务时,它插旗、收鱼篓、把成果放进小仓库。</p><p>它应该绑定真实状态,而不是纯装饰动画。底层可以接收类似 `agent.started`、`tool.called`、`tool.finished`、`agent.blocked`、`agent.completed`、`agent.needs_input` 的事件,再映射成小世界里的动作。这样用户看到的不是假的热闹,而是真实工作遥测的游戏化表达。</p><p>折叠时它可以像灵动岛一样只显示一行状态:几个 agent 在工作、有没有卡住、有没有新产出。展开时才看到完整的小岛、湖面、钓手、任务气泡和今日成果。</p><p>关联:<a class=\"wl\" data-id=\"等待剧场\">等待剧场</a>、<a class=\"wl\" data-id=\"多钓手隐喻\">多钓手隐喻</a>、<a class=\"wl\" data-id=\"状态游戏化\">状态游戏化</a>、<a class=\"wl\" data-id=\"第三者闲置游戏\">第三者闲置游戏</a></p>", "links": ["等待剧场", "多钓手隐喻", "状态游戏化", "第三者闲置游戏"], "suggestions": ["如果把「Agent桌面观察器」做成一个最小产品,第一屏应该让用户看到什么?", "反过来想:「Agent桌面观察器」最可能不成立、最容易变无聊的地方在哪里?", "围绕「产品、AI」换一个完全不同领域,「Agent桌面观察器」会变成什么?", "从用户情绪看,「Agent桌面观察器」解决的是焦虑、好奇、陪伴、成就感里的哪一种?", "沿着「等待剧场」继续发散,它和「Agent桌面观察器」能组合出一个什么新方向?"], "ghost": false}, {"id": "Mac版小钓岛", "date": "2026-06-11", "created_at": "2026-06-11T17:47:02+08:00", "modified": 1781189233.6683526, "path": "Mac版小钓岛.md", "project": "", "topics": ["产品", "AI", "游戏"], "body": "Fishing Agents 可以先从 Mac 版本开始做,因为它的使用场景天然是桌面常驻:用户工作 留一两句最关键的原话,再写整理后的想法。这样以后回看时,不只是看到\"这个想法是什么\",还能想起它当时是怎么从聊天里冒出来的。尤其是产品判断、命名、交互边界和用户很在意的点,原句比概括更可信。\n\n原句:\n> 包括用户说的话里重要的原句是不是也得记录下来啊 我觉得这个很重要\n\n关联:[[钓岛三层结构]]、[[岛内状态弹窗]]、[[鱼获记录]]", "html": "<p>灵感泡泡不能只记录整理后的结论,还应该保存用户说话时的重要原句。因为原句里有语气、犹豫、强调和真实边界,这些东西如果只被总结成产品语言,时间久了会丢失。</p><p>原句可以作为每个泡泡的&quot;锚点&quot;:先保留一两句最关键的原话,再写整理后的想法。这样以后回看时,不只是看到&quot;这个想法是什么&quot;,还能想起它当时是怎么从聊天里冒出来的。尤其是产品判断、命名、交互边界和用户很在意的点,原句比概括更可信。</p><p>原句:</p><blockquote>包括用户说的话里重要的原句是不是也得记录下来啊 我觉得这个很重要</blockquote><p>关联:<a class=\"wl\" data-id=\"钓岛三层结构\">钓岛三层结构</a>、<a class=\"wl\" data-id=\"岛内状态弹窗\">岛内状态弹窗</a>、<a class=\"wl\" data-id=\"鱼获记录\">鱼获记录</a></p>", "links": ["钓岛三层结构", "岛内状态弹窗", "鱼获记录"], "suggestions": ["如果把「原句锚点」做成一个最小产品,第一屏应该让用户看到什么?", "反过来想:「原句锚点」最可能不成立、最容易变无聊的地方在哪里?", "围绕「产品、AI」换一个完全不同领域,「原句锚点」会变成什么?", "从用户情绪看,「原句锚点」解决的是焦虑、好奇、陪伴、成就感里的哪一种?", "沿着「钓岛三层结构」继续发散,它和「原句锚点」能组合出一个什么新方向?"], "ghost": false}, {"id": "多钓手隐喻", "date": "2026-06-11", "created_at": "2026-06-11T17:39:54+08:00", "modified": 1781189233.8421319, "path": "多钓手隐喻.md", "project": "", "topics": ["AI", "游戏", "交互"], "body": "钓鱼很适合表达多 agent 协作,因为它不是\"谁最快冲线\",而是\"谁在不同水域里钓到了有价值的东西\"。每个钓手可以代表一个 agent,每个钓点代表一种任务方向或资料来源。\n\n比如研究员 agent 在深水区钓事实、资料、引用;产品经理 agent 在码头边钓用户场景和优先级;设计师 agent 在芦苇旁钓视觉隐喻和交互细节;工程师 agent 在石头边钓实现方案、风险和边界条件;反例 agent 在阴影处钓漏洞和不靠谱的地方。\n\n等待时用户看到的不是抽象进度条,而是鱼漂动了、鱼线绷紧、有人换饵、有人换钓点、有人钓上水草。鱼代表产出:小鱼是普通观点,大鱼是关键洞察,稀有鱼是重大突破,水草和破罐头是无效尝试。\n\n这个隐喻比赛马更适合复杂任务。赛马强调速度和胜负,钓鱼强调探索和收获。多 agent 不是一定要竞争,很多时候是在不同方向同时试探,最后由主 AI 把各个钓手的鱼挑出来,整理成最终答案。\n\n关联:[[Agent桌面观察器]]、[[第三者闲置游戏]]、[[鱼获记录]]、[[状态游戏化]]", "html": "<p>钓鱼很适合表达多 agent 协作,因为它不是&quot;谁最快冲线&quot;,而是&quot;谁在不同水域里钓到了有价值的东西&quot;。每个钓手可以代表一个 agent,每个钓点代表一种任务方向或资料来源。</p><p>比如研究员 agent 在深水区钓事实、资料、引用;产品经理 agent 在码头边钓用户场景和优先级;设计师 agent 在芦苇旁钓视觉隐喻和交互细节;工程师 agent 在石头边钓实现方案、风险和边界条件;反例 agent 在阴影处钓漏洞和不靠谱的地方。</p><p>等待时用户看到的不是抽象进度条,而是鱼漂动了、鱼线绷紧、有人换饵、有人换钓点、有人钓上水草。鱼代表产出:小鱼是普通观点,大鱼是关键洞察,稀有鱼是重大突破,水草和破罐头是无效尝试。</p><p>这个隐喻比赛马更适合复杂任务。赛马强调速度和胜负,钓鱼强调探索和收获。多 agent 不是一定要竞争,很多时候是在不同方向同时试探,最后由主 AI 把各个钓手的鱼挑出来,整理成最终答案。</p><p>关联:<a c  ["产品", "AI", "交互"], "body": "Agent 的真实工作状态可以被映射成游戏动作。这样用户看到的不是抽象日志,而是一个能被快速理解的状态世界:开始任务、调用工具、工具返回、卡住、等待确认、完成,都能变成可视化动作。\n\n一组可能的映射是: `agent.started` 等于钓手出发或小人上岛; `tool.called` 等于抛竿、翻书、打开工具箱; `tool.finished` 等于鱼漂晃动或拿到材料; `agent.blocked` 等于鱼线打结、钓到水草、站在原地冒问号; `agent.needs_input` 等于小人举牌等用户; `agent.completed` 等于收线、插旗、把鱼放进今日鱼篓。\n\n这里最重要的是克制。它不应该假装展示 AI 的完整思考过程,也不应该把每个底层细节都可视化成噪音。它更像一个状态翻译层:把真正影响用户判断的信息翻译成温和、可爱的动作。\n\n如果做得好,用户会少一点焦虑:他不用打开日志也知道后台还活着、卡在哪里、有没有成果。这个工具的价值不是娱乐本身,而是把 agent 的不可见劳动变成可感知、可回看的协作过程。\n\n关联:[[Agent桌面观察器]]、[[等待剧场]]、[[多钓手隐喻]]、[[鱼获记录]]", "html": "<p>Agent 的真实工作状态可以被映射成游戏动作。这样用户看到的不是抽象日志,而是一个能被快速理解的状态世界:开始任务、调用工具、工具返回、卡住、等待确认、完成,都能变成可视化动作。</p><p>一组可能的映射是: `agent.started` 等于钓手出发或小人上岛; `tool.called` 等于抛竿、翻书、打开工具箱; `tool.finished` 等于鱼漂晃动或拿到材料; `agent.blocked` 等于鱼线打结、钓到水草、站在原地冒问号; `agent.needs_input` 等于小人举牌等用户; `agent.completed` 等于收线、插旗、把鱼放进今日鱼篓。</p><p>这里最重要的是克制。它不应该假装展示 AI 的完整思考过程,也不应该把每个底层细节都可视化成噪音。它更像一个状态翻译层:把真正影响用户判断的信息翻译成温和、可爱的动作。</p><p>如果做得好,用户会少一点焦虑:他不用打开日志也知道后台还活着、卡在哪里、有没有成果。这个工具的价值不是娱乐本身,而是把 agent 的不可见劳动变成可感知、可回看的协作过程。</p><p>关联:<a class=\"wl\" data-id=\"Agent桌面观察器\">Agent桌面观察器</a>、<a class=\"wl\" data-id=\"等待剧场\">等待剧场</a>、<a class=\"wl\" data-id=\"多钓手隐喻\">多钓手隐喻</a>、<a class=\"wl\" data-id=\"鱼获记录\">鱼获记录</a></p>", "links": ["Agent桌面观察器", "等待剧场", "多钓手隐喻", "鱼获记录"], "suggestions": ["如果把「状态游戏化」做成一个最小产品,第一屏应该让用户看到什么?", "反过来想:「状态游戏化」最可能不成立、最容易变无聊的地方在哪里?", "围绕「产品、AI」换一个完全不同领域,「状态游戏化」会变成什么?", "从用户情绪看,「状态游戏化」解决的是焦虑、好奇、陪伴、成就感里的哪一种?", "沿着「Agent桌面观察器」继续发散,它和「状态游戏化」能组合出一个什么新方向?"], "ghost": false}, {"id": "玩法反推引擎", "date": "2026-06-13", "created_at": "2026-06-13T22:25:25+08:00", "modified": 1781360864.9750097, "path": "玩法反推引擎.md", "project": "", "topics": ["产品", "游戏"], "body": "独立游戏开发的引擎选择不应该先从“哪个引擎最强”开始,而应该从玩法的存在方式反推:它是一个需要大量关卡和平台发行的 2D 游戏,一个靠真实桌面状态运行的 ambient game,一个强调高表现力的 3D 世界,还是一个先验证手感和循环的小原型。\n\n如果方向贴近旁观、等待、桌面常驻、轻互动,像 Fishing Agents 或现实等待游戏化那类东西,SwiftUI + SpriteKit/Canvas 这种原生路线反而可能比 Unity 更自然,因为窗口、菜单栏、系统权限、桌面状态和轻量 UI 都是产品本体的一部分。如果要做面向 Steam 的传统 2D/2.5D 独立游戏,G 它和「第三者闲置游戏」能组合出一个什么新方向?"], "ghost": false}, {"id": "等待剧场", "date": "2026-06-11", "created_at": "2026-06-11T17:39:54+08:00", "modified": 1781189234.498999, "path": "等待剧场.md", "project": "", "topics": ["产品", "AI", "交互"], "body": "AI 回复前的等待时间不一定只能是一个转圈 loading,它可以被设计成一个\"思考剧场\"。用户发出问题之后,界面里不是静止等待,而是出现一个可旁观的小过程:不同思路被尝试、废稿被丢掉、关键词被捡起来、最终回答慢慢成形。\n\n这个想法的重点不是暴露 AI 的真实推理链,而是用抽象的状态和隐喻,让用户感到\"后台确实在忙\"。比如小人经过\"拆问题\"、\"找资料\"、\"组织结构\"、\"润色语气\"几个站点;或者几个思路角色在剧场里排练,严肃版、直接版、创意版轮流试台词,最后选出一个版本上台。\n\n它比普通 loading 更有情绪价值:等待不再是空白,而是一次小小的旁观。用户可以轻触影响方向,比如\"更大胆\"、\"更实用\"、\"更短\",但互动不能太重,否则 AI 回复出来时会打断用户正在玩的东西。\n\n关联:[[Agent桌面观察器]]、[[状态游戏化]]、[[第三者闲置游戏]]", "html": "<p>AI 回复前的等待时间不一定只能是一个转圈 loading,它可以被设计成一个&quot;思考剧场&quot;。用户发出问题之后,界面里不是静止等待,而是出现一个可旁观的小过程:不同思路被尝试、废稿被丢掉、关键词被捡起来、最终回答慢慢成形。</p><p>这个想法的重点不是暴露 AI 的真实推理链,而是用抽象的状态和隐喻,让用户感到&quot;后台确实在忙&quot;。比如小人经过&quot;拆问题&quot;、&quot;找资料&quot;、&quot;组织结构&quot;、&quot;润色语气&quot;几个站点;或者几个思路角色在剧场里排练,严肃版、直接版、创意版轮流试台词,最后选出一个版本上台。</p><p>它比普通 loading 更有情绪价值:等待不再是空白,而是一次小小的旁观。用户可以轻触影响方向,比如&quot;更大胆&quot;、&quot;更实用&quot;、&quot;更短&quot;,但互动不能太重,否则 AI 回复出来时会打断用户正在玩的东西。</p><p>关联:<a class=\"wl\" data-id=\"Agent桌面观察器\">Agent桌面观察器</a>、<a class=\"wl\" data-id=\"状态游戏化\">状态游戏化</a>、<a class=\"wl\" data-id=\"第三者闲置游戏\">第三者闲置游戏</a></p>", "links": ["Agent桌面观察器", "状态游戏化", "第三者闲置游戏"], "suggestions": ["如果把「等待剧场」做成一个最小产品,第一屏应该让用户看到什么?", "反过来想:「等待剧场」最可能不成立、最容易变无聊的地方在哪里?", "围绕「产品、AI」换一个完全不同领域,「等待剧场」会变成什么?", "从用户情绪看,「等待剧场」解决的是焦虑、好奇、陪伴、成就感里的哪一种?", "沿着「Agent桌面观察器」继续发散,它和「等待剧场」能组合出一个什么新方向?"], "ghost": false}, {"id": "钓岛三层结构", "date": "2026-06-11", "created_at": "2026-06-11T22:24:43+08:00", "modified": 1781189645.6230562, "path": "钓岛三层结构.md", "project": "", "topics": ["产品", "AI", "交互"], "body": "Fishing Agents 不能只在 2 和 3 之间选择,也不能把真实状态监控丢掉。更准确的结构是 1、2、3 都要:小岛提供常驻陪伴感,真实状态弹窗提供可信度和可控感,鱼获记录提供一天结束后的收成感和记忆。\n\n原句:\n> 我也偏向2和3 但是1还是要做的 就是用那种弹窗的模式在我们的岛里 因为用户还是希望能在岛里看到所有agents的真实情况的 所以123都得需要\n\n这三层的分工可以很清楚:2 是外壳,让用户觉得桌面上真的有一群 agent 在钓鱼;1 是骨架,让这些钓手的动作和真实 agent 状态绑定,不是纯表演;3 是记忆,把真实任务结束后的成果沉淀成今日鱼篓、稀有鱼、水草和长期图鉴。\n\n关键边界是:小岛本体不要塞满信息,它只表达状态和生命感;用户需要细节时,通过岛内弹窗看每个 agent 的真实情况;任务结束后,再把过程和结果进入鱼获记录。这样 Fishing Agents 既不只是可爱桌宠,也不只是日志面板,而是一个有生命感的 AI 工作界面。\n\n关联:[[Mac版小钓岛]]、[[岛内状态弹窗]]、[[鱼获记录]]、[[多钓手隐喻]]、[[状态游戏化]]、[[原句锚点]]", "html": "<p>Fishing Agents 不能只在 2 和 3 之间选择,也不能把真实状态监控丢掉。更准确的结构是 1、2、3 都要:小岛提供常驻陪伴感,真实状态弹窗提供可信度和可控感,鱼获记录提供一天结束后的收成感和记忆。</p><p>原句:</p><blockquote>我也偏向2和3 但是1还是要做的 就是用那种弹窗的模式在我们的岛里 因为用户还是希望能在岛里看到所有agents的真实情况的 所以123都得需要</blockquote><p>这三层的分工可以很清楚:2 是外壳,让用户觉得桌面上真的有一群 agent 在钓鱼;1 是骨架,让这些钓手的动作和真实 agent 状态绑定,不是纯表演;3 是记忆,把真实任务结束后的成果沉淀成今日鱼篓、稀有鱼、水草和长期图鉴。</p><p>关键边界是:小岛本体不要塞满信息,它只表达状态和生命感;用户需要细节时,通过岛内弹窗看每个 agent 的真实情况;任务结束后,再把过程和结果进入鱼获记录。这样 Fishing Agents 既不只是可爱桌宠,也不只是日志面板,而是一个有生命感的 AI 工作界面。</p><p>关联:<a class=\"wl\" data-id=\"Mac版小钓岛\">Mac版小钓岛</a>、<a class=\"wl\" data-id=\"岛内状态弹窗\">岛内状态弹窗</a>、<a class=\"wl\" data-id=\"鱼获记录\">鱼获记录</a>、<a class=\"wl\" data-id=\"多钓手隐喻\">多钓手隐喻</a>、<a class=\"wl\" data-id=\"状态游戏化\">状态游戏化</a>、<a class=\"wl\" data-id=\"原句锚点\">原句锚点</a></p>", "links": ["Mac版小钓岛", "岛内状态弹窗", "鱼获记录", "多钓手隐喻", "状态游戏化", "原句锚点"], "suggestions": ["如果把「钓岛三层结构」做成一个最小产品,第一屏应该让用户看到什么?", "反过来想:「钓岛三层结构」最可能不成立、最容易变无聊的地方在哪里?", "围绕「产品、AI」换一个完全不同领域,「钓岛三层结构」会变成什么?", "从用户情绪看,「钓岛三层结构」解决的是焦虑、好奇、陪伴、成就感里的哪一种?", "沿着「Mac版小钓岛」继续发散,它和「钓岛三层结构」能组合出一个什么新方向?"], "ghost": false}, {"id": "鱼获记录", "date": "2026-06-11", "created_at": "2026-06-11T17:39:55+08:00", "modified": 1781189234.827098, "path": "鱼获记录.md", "project": "", "topics": ["产品", "游戏", "AI"], "body": "如果 agent 观察器采用钓鱼隐喻,就可以自然产生\"鱼获记录\"。这不是单纯的游戏分数,而是用户和 AI 今天一起完成了什么的轻量总结。\n\n鱼获可以包括:今日钓鱼时间,也就是 agent 工作总时长;今日鱼数,对应完成的任务、有效结论或中间产物;稀有鱼,对应关键洞察、根因定位、漂亮方案;水草次数,对应无效尝试或失败路径;最忙钓手,对应最活跃的 agent;空军记录,对应跑了很久但没有有效产出的时段。\n\n这个记录会让后台工作变得有记忆。用户一天结束时可以\"收鱼篓\",看到今天 AI 到底帮自己做了多少事。长期还能形成鱼图鉴:不同项目、不同 agent、不同任务类型会出现不同鱼种。比如代码项目里常见 bug 鱼、测试鱼、重构鱼;产品项目里常见洞察鱼、竞品鱼、用户痛点鱼。\n\n鱼获记录的关键是要好玩但不幼稚。它可以很轻,像 Notion 里的日历和统计小组件,但用更有生命力的方式呈现。用户不是为了刷分而用 AI,而是在工作之后获得一点\"今天真的钓到东西了\"的反馈。\n\n关联:[[多钓手隐喻]]、[[第三者闲置游戏]]、[[状态游戏化]]、[[Agent桌面观察器]]", "html": "<p>如果 agent 观察器采用钓鱼隐喻,就可以自然 function validProjectValue(value){

async function postProjectApi(path, payload){

    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  });
  let data = {};
  try { data = await res.json(); } catch (_) {}
  if (!res.ok || data.ok === false) throw new Error(data.error || '项目操作失败');

function stamp(){
  const d = new Date();
  return d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
}
function downloadFile(name, text, type){
  if (exportStatus) exportStatus.textContent = '正在生成 ' + name;
  const blob = new Blob([text], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = name;
  document.body.appendChild(a);
  a.click();
  a.remove();
  showCopyToast('已开始导出');
  if (exportStatus) exportStatus.textContent = '已开始下载: ' + name;
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}
async function serverExport(type){
  if (exportStatus) exportStatus.textContent = '正在写入本地文件...';
  const res = await fetch('/api/export', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({type})
  });
  let data = {};
  try { data = await res.json(); } catch (_) {}
  if (!res.ok || data.ok === false) throw new Error(data.error || '导出失败');
  if (exportStatus) {
    exportStatus.innerHTML = '已保存: <a href="'+escAttr(data.url)+'" target="_blank">'+escHtml(data.path || data.filename)+'</a>';
  }
  showCopyToast('已导出到本地');
  return data;
}
function csvCell(value){

function exportMarkdown(){

function exportCsv(){

  downloadFile('灵感泡泡表格-' + stamp() + '.csv', rows.map(r=>r.map(csvCell).join(',')).join('\n'), 'text/csv;charset=utf-8');

function exportHarvest(){
  const real = N.filter(n=>!n.ghost);
  const byFreshness = real.slice().sort((a,b)=>
    String(b.created_at || b.date || '').localeCompare(String(a.created_at || a.date || '')) || b.idx - a.idx
  );
  const newestDate = byFreshness.map(n=>n.date).filter(Boolean).sort().pop();
  let recent = byFreshness.slice(0, 12);
  if (newestDate) {
    const end = new Date(newestDate + 'T00:00:00');
    const start = new Date(end);
    start.setDate(start.getDate() - 6);
    const recentByDate = byFreshness.filter(n=>{
      if (!n.date) return false;
      const d = new Date(n.date + 'T00:00:00');
      return d >= start && d <= end;
    });
    if (recentByDate.length) recent = recentByDate;
  }

  const topicCount = new Map();
  real.forEach(n=>n.topics.forEach(t=>topicCount.set(t, (topicCount.get(t) || 0) + 1)));
  const hotTopics = [...topicCount.entries()]
    .sort((a,b)=>b[1] - a[1] || a[0].localeCompare(b[0]))
    .slice(0, 10);
  const connected = real.slice()
    .sort((a,b)=>b.degree - a.degree || String(b.created_at || b.date || '').localeCompare(String(a.created_at || a.date || '')))
    .slice(0, 8);
  const ghosts = N.filter(n=>n.ghost).slice(0, 10);

  const pool = [...connected, ...recent].filter((n, i, arr)=>arr.findIndex(x=>x.id === n.id) === i);
  const seenPairs = new Set();
  const combos = [];
  for (let i = 0; i < pool.length; i++) {
    for (let j = i + 1; j < pool.length; j++) {
      const a = pool[i], b = pool[j];
      const key = [a.id, b.id].sort().join('::');
      if (seenPairs.has(key)) continue;
      const sharedTopic = a.topics.find(t=>b.topics.includes(t));
      const linked = a.links.includes(b.id) || b.links.includes(a.id);
      if (!sharedTopic && !linked) continue;
      seenPairs.add(key);
      combos.push({a, b, reason: sharedTopic ? '共同主题: ' + sharedTopic : '已有双链关联'});
      if (combos.length >= 6) break;
    }
    if (combos.length >= 6) break;
  }
  if (!combos.length && byFreshness.length >= 2) {
    combos.push({a: byFreshness[0], b: byFreshness[1], reason: '最近相邻出现'});
  }

  const lines = [
    '# 灵感收成',
    '',
    '- 生成时间: ' + DATA.generated,
    '- 泡泡数: ' + real.length,
    '- 关联数: ' + E.length,
    '',
    '> 这是一份临时视图,不改变任何泡泡文件。项目只是可选视角;真正的底层结构还是泡泡之间的双链和主题气味。',
    '',
    '## 最近新增',
    ''
  ];
  (recent.length ? recent : []).forEach(n=>{
    const meta = [n.date, n.topics.join(', ')].filter(Boolean).join(' · ');
    lines.push('- [[' + n.id + ']]' + (meta ? ' - ' + meta : ''));
  });
  if (!recent.length) lines.push('- 暂时没有可统计的新增泡泡。');

  lines.push('', '## 热门主题', '');
  hotTopics.forEach(([topic, count])=>lines.push('- ' + topic + ': ' + count + ' 个泡泡'));
  if (!hotTopics.length) lines.push('- 暂时没有主题标签。');

  lines.push('', '## 连接最多的泡泡', '');
  connected.forEach(n=>lines.push('- [[' + n.id + ']] - ' + n.degree + ' 条连接'));
  if (!connected.length) lines.push('- 暂时没有可统计的连接。');

  lines.push('', '## 可以展开的幽灵泡泡', '');
  ghosts.forEach(n=>lines.push('- [[' + n.id + ']]'));
  if (!ghosts.length) lines.push('- 暂时没有幽灵泡泡。');

  lines.push('', '## 组合发散', '');
  combos.forEach(({a,b,reason})=>{
    lines.push('- 把 [[' + a.id + ']] 和 [[' + b.id + ']] 碰一碰(' + reason + '): 它们能不能变成一个更小、更可验证的新实验?');
  });
  if (!combos.length) lines.push('- 暂时没有足够的泡泡可以组合。');

  lines.push('', '## 反向问题', '');
  lines.push('- 最近这些想法里,哪一个最容易只是好玩但没有持续使用场景?');
  lines.push('- 哪一个想法可以用一天内的小实验验证,而不是先做完整产品?');
  lines.push('- 哪些泡泡不该被固定到项目里,反而应该继续自由漂移一阵?');

  downloadFile('灵感收成-' + stamp() + '.md', lines.join('\n'), 'text/markdown;charset=utf-8');
}

    } catch (_) {
      ok = false;
    }
  }
  if (!ok) ok = fallbackCopy(text);
  const message = ok ? '已复制,可以直接粘贴继续聊。' : '复制被浏览器拦住了,话题如下: ' + text;
  if (tip) tip.textContent = message;
  showCopyToast(ok ? '已复制' : '复制失败');
}
document.addEventListener('click', e=>{
  const idea = e.target.closest('.idea-btn');
  if (idea) {
    const text = idea.dataset.suggestion || idea.textContent.trim();
    const tip = idea.closest('.ideas, .home-ideas')?.querySelector('.copy-tip');
    copyIdea(text, tip);
    return;
  }
  const a = e.target.closest('a.wl');
  if (a && byId[a.dataset.id]) { openPanel(byId[a.dataset.id]); centerOn(byId[a.dataset.id]); }
});

// ---------- 主页面继续聊聊 ----------
const ideaLauncher = document.getElementById('idea-launcher');
const homeIdeas = document.getElementById('home-ideas');
const homeIdeasSource = document.getElementById('home-ideas-source');
const homeIdeasList = document.getElementById('home-ideas-list');
const ideaSources = N.filter(n=>!n.ghost && n.suggestions && n.suggestions.length)
  .sort((a,b)=>String(b.created_at || b.date || '').localeCompare(String(a.created_at || a.date || '')) || b.idx - a.idx);
let ideaSourceIndex = 0;
let currentIdeaSource = null;
function escAttr(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function randomIdeaSource(except){
  if (!ideaSources.length) return null;
  const pool = ideaSources.length > 1 && except ? ideaSources.filter(n=>n!==except) : ideaSources;
  return pool[Math.floor(Math.random() * pool.length)];
}
function renderHomeIdeas(source){
  if (!source || !source.suggestions || !source.suggestions.length) {
    homeIdeas.hidden = true;
    ideaLauncher.hidden = true;
    return;
  }
  currentIdeaSource = source;
  homeIdeas.hidden = false;
  ideaLauncher.hidden = false;
  homeIdeasSource.textContent = '从「' + source.id + '」发散';
  homeIdeasList.innerHTML = source.suggestions.map(s=>
    '<button class="idea-btn" type="button" data-suggestion="'+escAttr(s)+'">'+escHtml(s)+'</button>'
  ).join('');
}
if (!ideaSources.length) ideaLauncher.hidden = true;
ideaLauncher.addEventListener('click', () => {
  renderHomeIdeas(randomIdeaSource(currentIdeaSource));
  homeIdeas.classList.add('open');
  ideaLauncher.hidden = true;
});
document.getElementById('close-ideas').addEventListener('click', () => {
  homeIdeas.classList.remove('open');
  if (ideaSources.length) ideaLauncher.hidden = false;
});
document.getElementById('cycle-ideas').addEventListener('click', e=>{
  e.stopPropagation();
  if (!ideaSources.length) return;
  renderHomeIdeas(randomIdeaSource(currentIdeaSource));
});

// ---------- 力导向图 ----------
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W=0, H=0, dpr=1;
function resize(){
  dpr = window.devicePixelRatio||1;
  W = cv.clientWidth; H = cv.clientHeight;
  cv.width = W*dpr; cv.height = H*dpr;
  draw();
}
window.addEventListener('resize', resize);

N.forEach((n,i)=>{
  const a = i*2.399963, r = 30*Math.sqrt(i+1);
  n.x = Math.cos(a)*r; n.y = Math.sin(a)*r;
  n.vx=0; n.vy=0; n.fixed=false;
});
let alpha = 1;
const view = { x:0, y:0, k:1 };   // 世界原点在画布中心,再加偏移和缩放

function tick(){
  if (alpha > 0.003 && N.length) {
    alpha *= 0.985;
    const rep = 3600, spring = 0.03, len = 135, grav = 0.008;
    for (let i=0;i<N.length;i++){
      for (let j=i+1;j<N.length;j++){
        const a=N[i], b=N[j];
        let dx=b.x-a.x, dy=b.y-a.y;
        let d2 = dx*dx+dy*dy || 1;
        if (d2 < 360000) {
          const f = rep/d2 * alpha;
          const d = Math.sqrt(d2);
          dx/=d; dy/=d;
          a.vx -= dx*f; a.vy -= dy*f;
          b.vx += dx*f; b.vy += dy*f;
        }
      }
    }
    E.forEach(([ia,ib])=>{
      const a=N[ia], b=N[ib];
      const dx=b.x-a.x, dy=b.y-a.y;
      const d = Math.sqrt(dx*dx+dy*dy)||1;
      const f = spring*(d-len)*alpha;
      a.vx += dx/d*f; a.vy += dy/d*f;
      b.vx -= dx/d*f; b.vy -= dy/d*f;
    });
    N.forEach(n=>{
      n.vx -= n.x*grav*alpha; n.vy -= n.y*grav*alpha;
      if (!n.fixed){ n.x += n.vx; n.y += n.vy; }
      n.vx *= 0.85; n.vy *= 0.85;
    });
    draw();
  }
  requestAnimationFrame(tick);
}

function toScreen(p){ return { x: W/2 + (p.x+view.x)*view.k, y: H/2 + (p.y+view.y)*view.k }; }
function toWorld(sx,sy){ return { x:(sx-W/2)/view.k - view.x, y:(sy-H/2)/view.k - view.y }; }

function draw(){
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);
  const nbr = new Set();
  if (selected) E.forEach(([a,b])=>{
    if(a===selected.idx){nbr.add(b);} if(b===selected.idx){nbr.add(a);}
  });
  const visible = new Set(N.filter(isVisibleNode).map(n=>n.idx));
  const qHits = query ? new Set(N.filter(n=>matchesProject(n) && matchesQuery(n)).map(n=>n.idx)) : null;
  ctx.lineWidth = 1;
  E.forEach(([ia,ib])=>{
    if (!visible.has(ia) || !visible.has(ib)) return;
    const a=toScreen(N[ia]), b=toScreen(N[ib]);
    const hot = selected && (ia===selected.idx || ib===selected.idx);
    const queryHot = qHits && (qHits.has(ia) || qHits.has(ib));
    ctx.strokeStyle = hot ? 'rgba(17,17,17,.72)' : (queryHot ? 'rgba(17,17,17,.32)' : 'rgba(31,31,31,'+(selected || qHits?'.10':'.20')+')');
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
  });
  N.forEach(n=>{
    if (!visible.has(n.idx)) return;
    const p = toScreen(n);
    const dimmed = selected && n!==selected && !nbr.has(n.idx);
    const queryDim = qHits && !qHits.has(n.idx);
    ctx.globalAlpha = (dimmed || queryDim) ? 0.25 : 1;
    ctx.beginPath();
    ctx.arc(p.x, p.y, n.r*Math.min(view.k,1.6) + 6, 0, 7);
    ctx.fillStyle = n.ghost ? 'rgba(31,31,31,.06)' : 'rgba(31,31,31,.06)';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(p.x, p.y, n.r*Math.min(view.k,1.6), 0, 7);
    ctx.fillStyle = n.color;
    if (n.ghost){ ctx.setLineDash([3,3]); ctx.strokeStyle=GHOST; ctx.lineWidth=1.2; ctx.stroke(); ctx.setLineDash([]);
      ctx.globalAlpha *= .5; ctx.fill(); ctx.globalAlpha = (dimmed || queryDim)?0.25:1; }
    else ctx.fill();
    if (n===selected || (qHits && qHits.has(n.idx))){
      ctx.strokeStyle='rgba(255,255,255,.98)';
      ctx.lineWidth=3;
      ctx.stroke();
      ctx.strokeStyle='rgba(17,17,17,.62)';
      ctx.lineWidth=1.2;
      ctx.stroke();
    }
    if (view.k > 0.45 || n===selected || nbr.has(n.idx) || (qHits && qHits.has(n.idx))){
      ctx.fillStyle = (dimmed || queryDim) ? 'rgba(31,31,31,.34)' : '#1f1f1f';
      ctx.font = '12px -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif';
      ctx.textAlign='center';
      ctx.fillText(n.id, p.x, p.y + n.r*Math.min(view.k,1.6) + 13);
    }
    ctx.globalAlpha = 1;
  });
}

function hit(sx,sy){
  for (let i=N.length-1;i>=0;i--){
    if (!isVisibleNode(N[i])) continue;
    const p = toScreen(N[i]);
    const r = N[i].r*Math.min(view.k,1.6)+5;
    if ((sx-p.x)**2+(sy-p.y)**2 < r*r) return N[i];
  }
  return null;
}
function centerOn(n){
  if (n.x===undefined) return;
  view.x = -n.x; view.y = -n.y;
  draw();
}

let dragNode=null, panning=false, last=null, moved=false;
cv.addEventListener('mousedown', e=>{
  const n = hit(e.offsetX, e.offsetY);
  moved=false; last={x:e.offsetX,y:e.offsetY};
  if (n){ dragNode=n; n.fixed=true; }
  else panning=true;
});
window.addEventListener('mousemove', e=>{
  if(!last) return;
  const r = cv.getBoundingClientRect();
  const sx = e.clientX-r.left, sy=e.clientY-r.top;
  const dx = sx-last.x, dy = sy-last.y;
  if (Math.abs(dx)+Math.abs(dy)>2) moved=true;
  if (dragNode){
    const w = toWorld(sx,sy);
    dragNode.x=w.x; dragNode.y=w.y; alpha=Math.max(alpha,0.25); draw();
  } else if (panning){
    view.x += dx/view.k; view.y += dy/view.k; draw();
  }
  last={x:sx,y:sy};
});
window.addEventListener('mouseup', e=>{
  if (dragNode){ dragNode.fixed=false; if(!moved) openPanel(dragNode); }
  else if (panning && !moved && e.target===cv){ panel.classList.remove('open'); selected=null; draw(); }
  dragNode=null; panning=false; last=null;
});
cv.addEventListener('wheel', e=>{
  e.preventDefault();
  const before = toWorld(e.offsetX, e.offsetY);
  view.k = Math.min(4, Math.max(0.15, view.k * Math.exp(-e.deltaY*0.0015)));
  const after = toWorld(e.offsetX, e.offsetY);
  view.x += after.x-before.x; view.y += after.y-before.y;
  draw();
}, {passive:false});

// ---------- 时间线 ----------
let tlBuilt = false;
function buildTimeline(force=false){
  if (tlBuilt && !force) return; tlBuilt = true;
  const wrap = document.getElementById('view-timeline');
  const dated = N.filter(n=>n.date && isVisibleNode(n));
  if (!dated.length){ wrap.innerHTML='<div style="padding:60px;color:var(--dim)">还没有泡泡</div>'; return; }
  const timelineDays = [...new Set(dated.map(n=>n.date))].sort();
  const cols = {};
  timelineDays.forEach((d,i)=>cols[d]=i);
  const stack = timelineDays.map(()=>0);
  const colW=170, rowH=64, top=80, leftPad=60;
  dated.forEach(n=>{
    const c = cols[n.date];
    n.tx = leftPad + c*colW + colW/2;
    n.ty = top + (stack[c]++)*rowH + 40;
  });
  const width = leftPad*2 + timelineDays.length*colW;
  const height = top + Math.max(...stack, 1)*rowH + 80;
  let svg = '<svg id="tl" width="'+width+'" height="'+height+'" xmlns="http://www.w3.org/2000/svg">';
  // 列标题和分隔
  timelineDays.forEach((d,i)=>{
    const x = leftPad + i*colW + colW/2;
    svg += '<text x="'+x+'" y="34" text-anchor="middle" fill="#77746b" font-size="12">'+d+'</text>';
    if (i) svg += '<line x1="'+(leftPad+i*colW)+'" y1="50" x2="'+(leftPad+i*colW)+'" y2="'+(height-20)+'" stroke="rgba(32,32,29,.12)" stroke-dasharray="2,5"/>';
  });
  // 弧线
  E.forEach(([ia,ib])=>{
    if (!isVisibleNode(N[ia]) || !isVisibleNode(N[ib])) return;
    const a=N[ia], b=N[ib];
    if (a.tx===undefined || b.tx===undefined) return;
    if (a.date===b.date){
      const x=a.tx, y1=Math.min(a.ty,b.ty), y2=Math.max(a.ty,b.ty);
      svg += '<path d="M '+x+' '+y1+' C '+(x-46)+' '+y1+', '+(x-46)+' '+y2+', '+x+' '+y2+'" fill="none" stroke="rgba(31,31,31,.18)"/>';
    } else {
      const [l,r2] = a.tx<b.tx ? [a,b] : [b,a];
      const mx=(l.tx+r2.tx)/2, my=Math.min(l.ty,r2.ty)-34;
      svg += '<path d="M '+l.tx+' '+l.ty+' Q '+mx+' '+my+', '+r2.tx+' '+r2.ty+'" fill="none" stroke="rgba(17,17,17,.30)" stroke-width="1.2"/>';
    }
  });
  // 节点
  dated.forEach(n=>{
    const label = n.id.length>10 ? n.id.slice(0,10)+'…' : n.id;
    svg += '<g class="tl-node" data-idx="'+n.idx+'" style="cursor:pointer">'
      + '<circle cx="'+n.tx+'" cy="'+n.ty+'" r="'+Math.min(n.r,13)+'" fill="'+n.color+'"/>'
      + '<text x="'+n.tx+'" y="'+(n.ty+Math.min(n.r,13)+15)+'" text-anchor="middle" fill="#1f1f1f" font-size="11">'
      + label.replace(/&/g,'&amp;').replace(/</g,'&lt;') + '</text></g>';
  });
  svg += '</svg>';
  wrap.innerHTML = svg;
  wrap.querySelectorAll('.tl-node').forEach(g=>{
    g.addEventListener('click', ()=>openPanel(N[+g.dataset.idx]));
  });
}

// ---------- 标签切换 ----------
const vg = document.getElementById('view-graph'), vt = document.getElementById('view-timeline');
const tg = document.getElementById('tab-graph'), tt = document.getElementById('tab-timeline');
tg.onclick = ()=>{ vg.hidden=false; vt.hidden=true; tg.classList.add('on'); tt.classList.remove('on'); resize(); };
tt.onclick = ()=>{ vg.hidden=true; vt.hidden=false; tt.classList.add('on'); tg.classList.remove('on'); buildTimeline(); };

resize();
tick();
</script>
